<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservation Dashboard</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== RESET & BASE ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f0f2f5; 
            color: #333;
            overflow: hidden;
            height: 100vh;
        }

        /* ===== HEADER / NAVBAR ===== */
        .header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo {
            font-weight: 700;
            font-size: 18px;
            color: #d9335a;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
        }
        .nav-links span { cursor: pointer; }
        .nav-links .active { color: #d9335a; font-weight: 600; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-new {
            background: #222;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            background: #6c5ce7;
        }

        /* ===== TOOLBAR ===== */
        .toolbar {
            background: #4a4a4a;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toolbar i { cursor: pointer; font-size: 13px; }
        .date-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 3px 12px;
            border-radius: 4px;
        }
        .date-nav span { font-weight: 600; }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            display: flex;
            height: calc(100vh - 110px);
        }

        /* ===== LEFT PANEL - LISTINGS ===== */
        .listings-panel {
            width: 200px;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 10px 0;
        }
        .search-box {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }
        .listing-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }
        .listing-item:hover { background: #f8f9fa; }
        .listing-item.active { background: #e8f0fe; }
        .listing-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 1px solid #ddd;
        }
        .listing-title {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }
        .listing-menu { color: #999; font-size: 14px; }

        /* ===== RIGHT PANEL - DASHBOARD ===== */
        .dashboard-panel {
            flex: 1;
            background: white;
            overflow-y: auto;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
        }
        .dashboard-month-label {
            font-size: 16px;
            font-weight: 600;
            padding: 10px 0 5px 10px;
            color: #555;
        }

        /* ===== DASHBOARD GRID ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: visible !important;
            font-size: 12px;
        }
        .day-header {
            padding: 8px 0;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
        }
        .day-cell {
            min-height: 80px;
            border-right: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            padding: 4px;
            position: relative;
            overflow: visible !important;
        }
        .day-cell:nth-child(7n) { border-right: none; }
        .day-number {
            font-size: 11px;
            color: #999;
            position: absolute;
            top: 4px;
            right: 6px;
        }
        .day-cell.today .day-number {
            background: #d9335a;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 10px;
        }

        /* ===== RESERVATION BAR ===== */
        .reservation-bar {
            position: absolute;
            height: 26px;
            background: #5db5b0;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 2px 6px;
            gap: 6px;
            color: white;
            font-size: 10px;
            cursor: pointer;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            z-index: 1;
            /* Dynamic positioning */
            left: 50%;
            transform: translateX(-50%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .reservation-bar:hover {
            transform: translateX(-50%) scale(1.02);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .reservation-bar .guest-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.5);
            flex-shrink: 0;
        }
        .reservation-bar .guest-avatar-placeholder {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4a8a86;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .reservation-bar .guest-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 9px;
        }
        .reservation-bar .bar-menu {
            font-size: 8px;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .reservation-bar .count-badge {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 8px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #333;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }
        .modal-body {
            font-size: 14px;
            color: #555;
        }
        .modal-booking {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .modal-booking:last-child {
            border-bottom: none;
        }
        .modal-booking img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .modal-booking .placeholder-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4a8a86;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }
        .modal-booking-info {
            flex: 1;
        }
        .modal-booking-info .name {
            font-weight: 500;
        }
        .modal-booking-info .room {
            font-size: 12px;
            color: #888;
        }
        .modal-booking-info .dates {
            font-size: 11px;
            color: #666;
        }

        /* ===== TOOLTIP ===== */
        .tooltip {
            display: none;
            position: fixed;
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 999;
            max-width: 250px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .tooltip .tooltip-line {
            padding: 2px 0;
        }
        .tooltip .tooltip-line strong {
            color: #5db5b0;
        }

        /* ===== SCROLLBAR STYLING ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .listings-panel { width: 150px; }
            .day-cell { min-height: 60px; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <div class="logo">FavHost</div>
            <div class="nav-links">
                <span class="active">Dashboard</span>
                <a href="/calendar/" style="text-decoration:none; color:inherit;">Calendar</a>
                <span>Reservations</span>
                <span>Listing</span>
                <span>Tasks</span>
                <span>Enquiries (3)</span>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-new">New +</button>
            <div class="avatar-small">S</div>
        </div>
    </div>

    <!-- ===== TOOLBAR ===== -->
    <div class="toolbar">
        <div class="toolbar-left">
            <i class="fas fa-bars"></i>
            <span>Dashboard - Timeline view</span>
        </div>
        <div class="toolbar-left">
            <div class="date-nav">
                <i class="fas fa-chevron-left" id="prevMonth"></i>
                <span id="monthLabel">February 2026</span>
                <i class="fas fa-chevron-right" id="nextMonth"></i>
                <i class="fas fa-calendar-alt" style="margin-left:8px;"></i>
            </div>
        </div>
        <div class="toolbar-right">
            <i class="fas fa-sync-alt" id="refreshBtn"></i>
            <i class="fas fa-download"></i>
            <i class="fas fa-list"></i>
            <i class="fas fa-th-large"></i>
        </div>
    </div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="main-container">

        <!-- ===== LEFT PANEL ===== -->
        <div class="listings-panel">
            <div class="search-box">
                <input type="text" placeholder="Search listings" id="searchInput">
            </div>
            <div id="listingsList">
                {% for listing in listings %}
                <div class="listing-item" data-id="{{ listing.id }}">
                    {% if listing.room_image %}
                    <img src="{{ listing.room_image.url }}" class="listing-img" alt="{{ listing.room_title }}">
                    {% else %}
                    <div class="listing-img" style="background:#ddd; display:flex; align-items:center; justify-content:center; font-size:10px; color:#666;">No img</div>
                    {% endif %}
                    <div class="listing-title">{{ listing.room_title }}</div>
                    <div class="listing-menu"><i class="fas fa-ellipsis-v"></i></div>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- ===== DASHBOARD PANEL ===== -->
        <div class="dashboard-panel">
            <div class="dashboard-month-label">March 2018</div>
            <div id="dashboardContainer">
                <!-- Dashboard will be rendered by JavaScript -->
            </div>
        </div>

    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-title" id="modalTitle">Booking Details</div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- ===== TOOLTIP ===== -->
    <div class="tooltip" id="tooltip">
        <div id="tooltipContent"></div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // =============================================
        // DATA STATE
        // =============================================
        let currentYear = parseInt("{{ year|default:2026 }}");
        let currentMonth = parseInt("{{ month|default:1 }}");
        let dashboardData = {};

        // =============================================
        // DASHBOARD RENDERING
        // =============================================
        function renderDashboard() {
            const container = document.getElementById('dashboardContainer');
            
            // Get first day of month and number of days
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            // Update month label
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                                'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthLabel').textContent = 
                monthNames[currentMonth - 1] + ' ' + currentYear;

            // Build grid
            let html = '<div class="dashboard-grid">';
            
            // Day headers
            const dayHeaders = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
            dayHeaders.forEach(day => {
                html += `<div class="day-header">${day}</div>`;
            });
            
            // Empty cells before first day
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="day-cell"></div>';
            }
            
            // Day cells
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = (day === today.getDate() && 
                                currentMonth === today.getMonth() + 1 && 
                                currentYear === today.getFullYear());
                
                html += `<div class="day-cell ${isToday ? 'today' : ''}" data-day="${day}">`;
                html += `<div class="day-number">${day}</div>`;
                
                // ===== RESERVATION RENDERING =====
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                
                // Get reservations for this day
                const dayReservations = dashboardData[dateStr] || [];
                
                if (dayReservations.length > 0) {
                    // Show first reservation
                    const firstRes = dayReservations[0];
                    const totalCount = dayReservations.length;
                    const initial = firstRes.guest_name.charAt(0).toUpperCase();
                    
                    html += `
                        <div class="reservation-bar" 
                             data-date="${dateStr}"
                             onclick="openDashboardModal('${dateStr}')"
                             onmouseenter="showTooltip(event, '${dateStr}')"
                             onmouseleave="hideTooltip()"
                             style="top: 10px;">
                            ${firstRes.guest_photo ? 
                                `<img src="${firstRes.guest_photo}" class="guest-avatar">` : 
                                `<div class="guest-avatar-placeholder">${initial}</div>`
                            }
                            <span class="guest-name">${firstRes.guest_name}</span>
                            ${totalCount > 1 ? `<span class="count-badge">+${totalCount - 1}</span>` : ''}
                        </div>
                    `;
                }
                
                html += '</div>';
            }
            
            // Fill remaining cells
            const totalCells = firstDay + daysInMonth;
            const remaining = (7 - (totalCells % 7)) % 7;
            for (let i = 0; i < remaining; i++) {
                html += '<div class="day-cell"></div>';
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        // =============================================
        // FETCH DASHBOARD DATA
        // =============================================
        function fetchDashboardData() {
            fetch(`/api/dashboard/?year=${currentYear}&month=${currentMonth}`)
                .then(response => response.json())
                .then(data => {
                    dashboardData = data;
                    renderDashboard();
                })
                .catch(error => {
                    console.error('Error fetching dashboard data:', error);
                });
        }

        // =============================================
        // MODAL FOR DASHBOARD
        // =============================================
        function openDashboardModal(dateStr) {
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            const dayReservations = dashboardData[dateStr] || [];
            
            modalTitle.textContent = `Bookings for ${dateStr} (${dayReservations.length} booking${dayReservations.length > 1 ? 's' : ''})`;
            
            let html = '';
            dayReservations.forEach(res => {
                const initial = res.guest_name.charAt(0).toUpperCase();
                html += `
                    <div class="modal-booking">
                        ${res.guest_photo ? 
                            `<img src="${res.guest_photo}" alt="${res.guest_name}">` : 
                            `<div class="placeholder-avatar">${initial}</div>`
                        }
                        <div class="modal-booking-info">
                            <div class="name">${res.guest_name}</div>
                            <div class="room">Room: ${res.room_title}</div>
                            <div class="dates">${res.checkin} → ${res.checkout}</div>
                        </div>
                    </div>
                `;
            });
            
            modalBody.innerHTML = html;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // =============================================
        // TOOLTIP FOR DASHBOARD
        // =============================================
        function showTooltip(event, dateStr) {
            const tooltip = document.getElementById('tooltip');
            const tooltipContent = document.getElementById('tooltipContent');
            
            const dayReservations = dashboardData[dateStr] || [];
            
            let html = `<div style="font-weight:600; margin-bottom:4px;">${dateStr}</div>`;
            dayReservations.forEach(res => {
                html += `
                    <div class="tooltip-line">
                        <strong>${res.guest_name}</strong> - ${res.room_title}
                        <span style="font-size:10px; color:#aaa;">${res.checkin} → ${res.checkout}</span>
                    </div>
                `;
            });
            
            tooltipContent.innerHTML = html;
            tooltip.style.display = 'block';
            
            // Position tooltip
            const rect = event.target.getBoundingClientRect();
            tooltip.style.left = (rect.left + rect.width / 2 - 125) + 'px';
            tooltip.style.top = (rect.bottom + 10) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        // =============================================
        // NAVIGATION CONTROLS
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Left arrow click
            document.getElementById('prevMonth').addEventListener('click', function() {
                currentMonth--;
                if (currentMonth < 1) { currentMonth = 12; currentYear--; }
                fetchDashboardData();
            });
            
            // Right arrow click
            document.getElementById('nextMonth').addEventListener('click', function() {
                currentMonth++;
                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                fetchDashboardData();
            });
            
            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', function() {
                fetchDashboardData();
            });
            
            // Modal close
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            // Search filter
            document.getElementById('searchInput').addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                document.querySelectorAll('.listing-item').forEach(el => {
                    const title = el.querySelector('.listing-title').textContent.toLowerCase();
                    el.style.display = title.includes(searchTerm) ? 'flex' : 'none';
                });
            });
            
            // Load data
            fetchDashboardData();
        });
    </script>

</body>
